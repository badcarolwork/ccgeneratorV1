<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="masthead mb-auto">
        <h2 class="display-5 text-center">Custom Script tag generator</h2>
        <div class="text-center">Modify the Out-of-page format creative tag</div>
    </header>
    <div id="container" class="d-md-flex flex-md-equal w-100 my-md-3 ps-md-3 justify-content-md-center">
        <div class="rounded-4 text-bg-dark me-md-3 pt-3 px-3 pt-md-5 px-md-5 pb-md-5 text-center overflow-hidden">
            <form action="/submit" method="post" id="tagForm">
                <div class="mb-3 text-start">
                    <label for="format" class="form-label">Select Format</label>
                    <select id="formats" name="format" required class="form-select form-select-md mb-3 w-30">
                        <option value="">Select Creative format</option>
                        <option value="catfishvideo">Catfish (Video only)</option>
                        <option value="catfish">Catfish (with banner)</option>
                        <option value="inviewvideo">In-view video</option>
                        <option value="skinner">Skinner</option>
                    </select>
                    <div id="inputSkinnerID" name="skinnerId">
                        Flashtalking Skinner Placement ID: <input id="skinnerID" />
                    </div>
                </div>
                <div class="text-start mt-4">Flashtalking creative tag</div>

                <textarea id="tags" name="tag" rows="10" required class="mt-2"></textarea>

                <button type="submit" id="submit" class="btn btn-info px-4 py-2 mt-2">Generate Tag</button>
            </form>
        </div>
        <div class="rounded-4 text-bg-dark me-md-3 pt-3 px-3 pt-md-5 px-md-5 text-center overflow-hidden">
            <div id="resultPart">
                <h2>Result</h2>
                <div id="copyGuide" class="text-center mb-3">Kindly copy the creative tag for the ad delivery platform.</div>
                <textarea id="result" rows="10" disabled></textarea>
                <button id="copy" disabled class="btn btn-outline-success px-4 py-2 mt-2">Copy to clipboard</button>
            </div>
        </div>
    </div>
    <footer class="container py-2 text-center">
        <p class="fw-lighter">Copyright 2026. All right reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>

</body>

</html>
